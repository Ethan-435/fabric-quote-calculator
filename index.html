<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>з»ҫиҷ№зІҗй—ҲгҲЎжһЎйҺ¶гғӨзҺҜз’Ғпј„з•»йҚЈ?/title>
<style>
  :root {
    --bg: #f7f3ed;
    --surface: #ffffff;
    --surface-alt: #faf7f2;
    --text: #2c2416;
    --text-secondary: #6b5e4a;
    --text-tertiary: #9b8b73;
    --border: #e3d9c8;
    --accent: #3d5a80;
    --accent-light: #e8eff6;
    --highlight: #c17a3e;
    --highlight-light: #fdf3e7;
    --danger: #b5453c;
    --danger-light: #fdf0ef;
    --shadow-sm: 0 1px 3px rgba(44,36,22,0.06);
    --shadow-md: 0 4px 12px rgba(44,36,22,0.08);
    --radius-sm: 6px;
    --radius: 10px;
    --radius-lg: 14px;
    --font: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'Noto Sans SC', system-ui, sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html {
    font-family: var(--font);
    font-size: 15px;
    color: var(--text);
    background: var(--bg);
    -webkit-font-smoothing: antialiased;
  }

  body {
    max-width: 480px;
    margin: 0 auto;
    padding: 16px;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  .header {
    padding: 20px 0 8px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .header-icon {
    width: 40px; height: 40px;
    background: var(--accent);
    border-radius: var(--radius-sm);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; color: #fff;
  }
  .header-title {
    font-size: 1.25rem;
    font-weight: 700;
    color: var(--text);
  }
  .header-sub {
    font-size: 0.8rem;
    color: var(--text-tertiary);
    margin-top: 2px;
  }

  .section {
    background: var(--surface);
    border-radius: var(--radius-lg);
    padding: 18px;
    margin-bottom: 14px;
    box-shadow: var(--shadow-sm);
    border: 1px solid var(--border);
  }
  .section-title {
    font-size: 0.85rem;
    font-weight: 700;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title::before {
    content: '';
    width: 3px; height: 16px;
    background: var(--accent);
    border-radius: 2px;
  }

  .form-row {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 10px;
  }
  .form-row:last-child { margin-bottom: 0; }
  .form-group { flex: 1; min-width: 100px; }

  .form-label {
    display: block;
    font-size: 0.78rem;
    font-weight: 600;
    color: var(--text-secondary);
    margin-bottom: 5px;
  }
  .form-label .unit {
    font-weight: 400;
    color: var(--text-tertiary);
    font-size: 0.72rem;
  }

  input[type="number"] {
    width: 100%;
    padding: 10px 12px;
    font-size: 0.92rem;
    font-family: var(--font);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--surface-alt);
    color: var(--text);
    transition: border-color 0.15s ease, box-shadow 0.15s ease;
    outline: none;
    -webkit-appearance: none;
  }
  input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-light);
    background: #fff;
  }
  input::placeholder { color: var(--text-tertiary); }

  .meter-price-display {
    margin-top: 10px;
    padding: 10px 14px;
    background: var(--accent-light);
    border-radius: var(--radius-sm);
    font-size: 0.85rem;
    color: var(--accent);
    font-weight: 600;
    display: none;
  }
  .meter-price-display.visible { display: block; }

  .process-list { display: flex; flex-direction: column; gap: 8px; }
  .process-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 12px;
    background: var(--surface-alt);
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
  }
  .process-item .proc-num {
    font-size: 0.75rem;
    font-weight: 700;
    color: var(--text-tertiary);
    white-space: nowrap;
    min-width: 36px;
  }
  .process-item input {
    flex: 1;
    padding: 7px 10px;
    font-size: 0.85rem;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: #fff;
    min-width: 0;
    font-family: var(--font);
  }
  .process-item input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px var(--accent-light);
    outline: none;
  }
  .btn-remove {
    width: 30px; height: 30px;
    border: none; border-radius: 50%;
    background: var(--danger-light);
    color: var(--danger);
    cursor: pointer;
    font-size: 1.1rem;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s ease, transform 0.1s ease;
  }
  .btn-remove:hover { background: #f5d6d4; }
  .btn-remove:active { transform: scale(0.9); }

  .btn-add {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 9px 16px;
    font-size: 0.82rem;
    font-weight: 600;
    border: 1.5px dashed var(--border);
    border-radius: var(--radius-sm);
    background: transparent;
    color: var(--accent);
    cursor: pointer;
    transition: all 0.15s ease;
    margin-top: 8px;
  }
  .btn-add:hover { border-color: var(--accent); background: var(--accent-light); }
  .btn-add:active { transform: scale(0.97); }

  .result-section {
    background: var(--surface);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-md);
    border: 1px solid var(--border);
    overflow: hidden;
    margin-top: 4px;
  }
  .result-header {
    padding: 16px 18px;
    background: var(--accent);
    color: #fff;
  }
  .result-header-label {
    font-size: 0.78rem;
    opacity: 0.85;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .result-header-price {
    font-size: 2rem;
    font-weight: 800;
    line-height: 1.15;
    margin-top: 2px;
  }
  .result-header-price .tax-line {
    font-size: 0.85rem;
    font-weight: 500;
    opacity: 0.8;
    margin-top: 4px;
    display: block;
  }

  .result-breakdown { padding: 14px 18px; }
  .breakdown-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
    font-size: 0.84rem;
    border-bottom: 1px solid var(--border);
  }
  .breakdown-row:last-child { border-bottom: none; }
  .breakdown-label {
    color: var(--text-secondary);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .breakdown-label .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .breakdown-value {
    font-weight: 600;
    font-variant-numeric: tabular-nums;
    color: var(--text);
  }
  .breakdown-row.highlight {
    background: var(--highlight-light);
    margin: 0 -18px;
    padding: 10px 18px;
    border-bottom: none;
    border-radius: var(--radius-sm);
  }
  .breakdown-row.highlight .breakdown-value {
    color: var(--highlight);
    font-size: 0.95rem;
    font-weight: 700;
  }
  .breakdown-row.final {
    margin: 0 -18px;
    padding: 12px 18px;
    background: var(--accent-light);
    border-bottom: none;
    border-radius: var(--radius-sm);
    font-weight: 700;
  }
  .breakdown-row.final .breakdown-value {
    color: var(--accent);
    font-size: 1rem;
    font-weight: 800;
  }

  .empty-hint {
    text-align: center;
    padding: 24px 18px;
    color: var(--text-tertiary);
    font-size: 0.82rem;
  }
  .footer {
    text-align: center;
    padding: 20px 0 16px;
    font-size: 0.7rem;
    color: var(--text-tertiary);
  }

  @media (max-width: 380px) {
    body { padding: 10px; }
    .section { padding: 14px; }
    .form-row { gap: 8px; }
    input[type="number"] { padding: 9px 10px; font-size: 0.85rem; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-icon">з”Ҝ?/div>
  <div>
    <div class="header-title">й—ҲгҲЎжһЎйҺ¶гғӨзҺҜз’Ғпј„з•»йҚЈ?/div>
    <div class="header-sub">жқҲж’іеҸҶйҚҸо„Ғжһ»жө й”ӢзүёйҚҷе©…оқүйҸҚзЎ·зҙқй‘·оҒ„е§©йҺ№гҲўз•»йӘһжғ°о…ёз» жҘҒе§Өжө ?/div>
  </div>
</div>

<div class="section">
  <div class="section-title">йҚ§оҲҡз«·йҚҷеӮӣжҡҹ</div>
  <div class="form-row">
    <div class="form-group">
      <label class="form-label">йҚ§оҲҡз«·йҚҸо„Ғжһ»жө ?<span class="unit">йҚҸ?йҚҸо„Ғжһ»</span></label>
      <input type="number" id="fabricPricePerKg" placeholder="жёҡе¬¶зҙ°50" step="0.01" min="0" autofocus>
    </div>
    <div class="form-group">
      <label class="form-label">й—Ӯг„Ҙз®ҷ <span class="unit">з»«?/span></label>
      <input type="number" id="fabricWidth" placeholder="жёҡе¬¶зҙ°1.5" step="0.01" min="0">
    </div>
  </div>
  <div class="form-row">
    <div class="form-group">
      <label class="form-label">йҚҸе¬®еҷё <span class="unit">g/mиҷҸ</span></label>
      <input type="number" id="fabricWeight" placeholder="жёҡе¬¶зҙ°200" step="1" min="0">
    </div>
    <div class="form-group">
      <label class="form-label">йҺ№зҶ»вӮ¬жҘғе·ј <span class="unit">%</span></label>
      <input type="number" id="lossRate" placeholder="жёҡе¬¶зҙ°5" step="0.1" min="0" max="100">
    </div>
  </div>
  <div class="meter-price-display" id="meterPriceDisplay">
    йҺ№гҲўз•»з»«е……зҺҜй”ӣ?strong id="meterPriceValue">йҲҘ?/strong> йҚҸ?з»«?  </div>
</div>

<div class="section">
  <div class="section-title">йҸҢж’ҙжҡЈйҚ”зҠІдјҗз’җ?<span class="unit">йҚҸ?з»«?/span></div>
  <div class="process-list" id="processList">
    <div class="process-item">
      <span class="proc-num">е®ёгғҘз°ӯ1</span>
      <input type="number" class="proc-price" placeholder="йҚҸ?з»«? step="0.01" min="0">
      <button class="btn-remove" title="йҚ’зҠ»ж«Һ" onclick="removeProcess(this)">&times;</button>
    </div>
  </div>
  <button class="btn-add" onclick="addProcess()">
    <span style="font-size:1.2em;line-height:1">+</span> еЁЈиҜІе§һе®ёгғҘз°ӯ
  </button>
</div>

<div class="section">
  <div class="section-title">з’җеңӯж•Өж¶“еәЎеҹ„еЁ‘?/div>
  <div class="form-row">
    <div class="form-group">
      <label class="form-label">жқ©ж„ҜжғҖз» пј„жӮҠз’җ?<span class="unit">йҚҸ?з»«?/span></label>
      <input type="number" id="managementFee" value="0.95" step="0.01" min="0">
    </div>
    <div class="form-group">
      <label class="form-label">жқ©ж„ҜеһӮ <span class="unit">йҚҸ?з»«?/span></label>
      <input type="number" id="shippingFee" placeholder="жёҡе¬¶зҙ°1.50" step="0.01" min="0">
    </div>
  </div>
  <div class="form-row">
    <div class="form-group">
      <label class="form-label">йҚҸжңөзІ¬з’җеңӯж•Ө <span class="unit">йҚҸ?з»«?/span></label>
      <input type="number" id="otherFee" placeholder="жёҡе¬¶зҙ°0.50" step="0.01" min="0">
    </div>
    <div class="form-group">
      <label class="form-label">йҚ’в•ӮйјҺйҗң?<span class="unit">%</span></label>
      <input type="number" id="profitRate" placeholder="жёҡе¬¶зҙ°8" step="0.1" min="0" max="100">
    </div>
  </div>
  <div class="form-row">
    <div class="form-group">
      <label class="form-label">з»ӢеәЈеҒЈз»Ҝз»ҳжҡҹ</label>
      <input type="number" id="taxRate" value="1.06" step="0.001" min="1">
    </div>
    <div class="form-group"></div>
  </div>
</div>

<div class="result-section">
  <div class="result-header">
    <div class="result-header-label">ж¶“е¶…жғҲз»ӢеәЁж”ўйҚһоҶ»зҺҜ</div>
    <div class="result-header-price" id="finalPriceNoTax">йҲҘ?йҚҸ?з»«?/div>
    <div class="tax-line" id="finalPriceWithTax">йҚҡоӮӨв—Јжө еҮӨзҙ°йҲҘ?йҚҸ?з»«?/div>
  </div>
  <div class="result-breakdown" id="breakdown">
    <div class="empty-hint">з’Үеі°пҪһйҚҸгғҘжҫӮз”ҜеҶЁеҸ•йҸӮгӮ„зҺҜйҠҶдҫҖжЈ¬йӘһе‘«вӮ¬дҪёеҺ й–Іе¶…еөҶйҚҷоҲҡзҙ‘жҝ®е¬ӯо…ёз» ?/div>
  </div>
</div>

<div class="footer">з»ҫиҷ№зІҗй—ҲгҲЎжһЎйҺ¶гғӨзҺҜз’Ғпј„з•»йҚЈ?/div>

<script>
(function(){
  var $ = function(id){ return document.getElementById(id); };

  var fabricPricePerKg = $('fabricPricePerKg');
  var fabricWidth = $('fabricWidth');
  var fabricWeight = $('fabricWeight');
  var lossRate = $('lossRate');
  var managementFee = $('managementFee');
  var shippingFee = $('shippingFee');
  var otherFee = $('otherFee');
  var taxRate = $('taxRate');
  var profitRate = $('profitRate');
  var processList = $('processList');
  var breakdown = $('breakdown');
  var finalPriceNoTax = $('finalPriceNoTax');
  var finalPriceWithTax = $('finalPriceWithTax');
  var meterPriceDisplay = $('meterPriceDisplay');
  var meterPriceValue = $('meterPriceValue');

  function collectProcesses(){
    var items = processList.querySelectorAll('.process-item');
    var result = [];
    for (var i = 0; i < items.length; i++) {
      var price = parseFloat(items[i].querySelector('.proc-price').value);
      if (!isNaN(price)) {
        result.push({ name: 'е®ёгғҘз°ӯ' + (i + 1), price: price });
      }
    }
    return result;
  }

  function formatMoney(v){
    if (Math.abs(v) < 0.001) return '0.00';
    return v.toFixed(2);
  }

  function recompute(){
    var kgPrice = parseFloat(fabricPricePerKg.value);
    var width = parseFloat(fabricWidth.value);
    var weight = parseFloat(fabricWeight.value);
    var loss = parseFloat(lossRate.value) || 0;
    var mgmt = parseFloat(managementFee.value) || 0;
    var ship = parseFloat(shippingFee.value) || 0;
    var other = parseFloat(otherFee.value) || 0;
    var tax = parseFloat(taxRate.value) || 1;
    var profit = parseFloat(profitRate.value) || 0;

    var processes = collectProcesses();
    var processTotal = 0;
    for (var i = 0; i < processes.length; i++) { processTotal += processes[i].price; }

    // йҚҸо„Ғжһ»жө ?йҲ«?з»«е……зҺҜ
    var meterPrice = null;
    if (!isNaN(kgPrice) && !isNaN(width) && !isNaN(weight) && width > 0) {
      var kgPerMeter = width * weight / 1000;
      meterPrice = kgPrice * kgPerMeter;
      meterPriceValue.textContent = formatMoney(meterPrice);
      meterPriceDisplay.classList.add('visible');
    } else {
      meterPriceDisplay.classList.remove('visible');
    }

    var hasBase = meterPrice !== null && meterPrice > 0;

    if (!hasBase) {
      finalPriceNoTax.textContent = 'йҲҘ?йҚҸ?з»«?;
      finalPriceWithTax.textContent = 'йҚҡоӮӨв—Јжө еҮӨзҙ°йҲҘ?йҚҸ?з»«?;
      breakdown.innerHTML = '<div class="empty-hint">з’Үеі°пҪһйҚҸгғҘжҫӮз”ҜеҶЁеҸ•йҸӮгӮ„зҺҜйҠҶдҫҖжЈ¬йӘһе‘«вӮ¬дҪёеҺ й–Іе¶…еөҶйҚҷоҲҡзҙ‘жҝ®е¬ӯо…ёз» ?/div>';
      return;
    }

    // йҲ¶?йҚ§оҲҡз«·йҺҙж„ӯж№° = з»«е……зҺҜ жў… (1 - йҺ№зҶ»вӮ¬жҘғе·ј/100)
    var fabricCost = meterPrice / (1 - loss / 100);

    // йҲ¶?йҸҢж’ҙжҡЈйҺҙж„ӯж№° = йҚ§оҲҡз«·йҺҙж„ӯж№° + йҚ”зҠІдјҗз’җз‘°жӮҺз’Ғ?    var dyeCost = fabricCost + processTotal;

    // йҲ¶?йҚҡоӮӨо…ёйҗһе—ҡеһӮ = йҸҢж’ҙжҡЈйҺҙж„ӯж№° + жқ©ж„ҜжғҖз» пј„жӮҠз’җ?    var withMgmt = dyeCost + mgmt;

    // йҲ¶?йҚҡоӮҘз№Қз’җ?= йҚҡоӮӨо…ёйҗһе—ҡеһӮ + жқ©ж„ҜеһӮ + йҚҸжңөзІ¬з’җеңӯж•Ө
    var withShipping = withMgmt + ship + other;

    // йҲ¶?ж¶“е¶…жғҲз»ӢеәқзҺҜ = йҚҡоӮҘз№Қз’җ?жў… (1 - йҚ’в•ӮйјҺйҗң?100)
    var priceNoTax = withShipping / (1 - profit / 100);

    // йҲ¶?йҚҡоӮӨв—Јжө ?= ж¶“е¶…жғҲз»ӢеәқзҺҜ и„і з»ӢеәЈеҒЈз»Ҝз»ҳжҡҹ
    var priceWithTax = priceNoTax * tax;

    finalPriceNoTax.textContent = formatMoney(priceNoTax) + ' йҚҸ?з»«?;
    finalPriceWithTax.textContent = 'йҚҡоӮӨв—Јжө еҮӨзҙ°' + formatMoney(priceWithTax) + ' йҚҸ?з»«?;

    var colors = ['#3d5a80','#5c7c99','#7a9bb5','#98b8d0','#b5d3e8','#d4eaf7','#c17a3e'];
    var html = '';

    html += '<div class="breakdown-row"><span class="breakdown-label"><span class="dot" style="background:' + colors[0] + '"></span>йҚҸо„Ғжһ»жө ?йҲ«?з»«е……зҺҜ</span><span class="breakdown-value">' + formatMoney(meterPrice) + ' йҚҸ?з»«?/span></div>';
    html += '<div class="breakdown-row"><span class="breakdown-label"><span class="dot" style="background:' + colors[0] + '"></span>йҚ§оҲҡз«·йҺҙж„ӯж№° (йҺ№зҶ»вӮ¬? + loss + '%)</span><span class="breakdown-value">' + formatMoney(fabricCost) + ' йҚҸ?з»«?/span></div>';

    if (processes.length > 0) {
      for (var k = 0; k < processes.length; k++) {
        html += '<div class="breakdown-row"><span class="breakdown-label" style="padding-left:16px">' + processes[k].name + '</span><span class="breakdown-value">' + formatMoney(processes[k].price) + ' йҚҸ?з»«?/span></div>';
      }
      html += '<div class="breakdown-row"><span class="breakdown-label"><span class="dot" style="background:' + colors[1] + '"></span>йҚ”зҠІдјҗз’җз‘°жӮҺз’Ғ?/span><span class="breakdown-value">' + formatMoney(processTotal) + ' йҚҸ?з»«?/span></div>';
    }

    html += '<div class="breakdown-row"><span class="breakdown-label"><span class="dot" style="background:' + colors[1] + '"></span>йҸҢж’ҙжҡЈйҺҙж„ӯж№°</span><span class="breakdown-value">' + formatMoney(dyeCost) + ' йҚҸ?з»«?/span></div>';
    html += '<div class="breakdown-row"><span class="breakdown-label"><span class="dot" style="background:' + colors[2] + '"></span>йҚҡоӮӨо…ёйҗһе—ҡеһӮ</span><span class="breakdown-value">' + formatMoney(withMgmt) + ' йҚҸ?з»«?/span></div>';

    var shipLabel = 'йҚҡоӮҘз№Қз’җ?;
    if (other > 0) shipLabel = 'йҚҡоӮҘз№Қз’җ?йҚҸжңөзІ¬';
    html += '<div class="breakdown-row"><span class="breakdown-label"><span class="dot" style="background:' + colors[3] + '"></span>' + shipLabel + '</span><span class="breakdown-value">' + formatMoney(withShipping) + ' йҚҸ?з»«?/span></div>';

    if (profit > 0) {
      html += '<div class="breakdown-row highlight"><span class="breakdown-label"><span class="dot" style="background:' + colors[5] + '"></span>ж¶“е¶…жғҲз»ӢеәқзҺҜ (йҚ’в•ӮйјҺйҗң?' + profit + '%)</span><span class="breakdown-value">' + formatMoney(priceNoTax) + ' йҚҸ?з»«?/span></div>';
    }

    html += '<div class="breakdown-row final"><span class="breakdown-label"><span class="dot" style="background:' + colors[6] + '"></span>йҚҡоӮӨв—Јжө ?(и„і' + tax + ')</span><span class="breakdown-value">' + formatMoney(priceWithTax) + ' йҚҸ?з»«?/span></div>';

    breakdown.innerHTML = html;
  }

  window.addProcess = function(){
    var items = processList.querySelectorAll('.process-item');
    var idx = items.length + 1;
    var div = document.createElement('div');
    div.className = 'process-item';
    div.innerHTML =
      '<span class="proc-num">е®ёгғҘз°ӯ' + idx + '</span>' +
      '<input type="number" class="proc-price" placeholder="йҚҸ?з»«? step="0.01" min="0">' +
      '<button class="btn-remove" title="йҚ’зҠ»ж«Һ" onclick="removeProcess(this)">&times;</button>';
    processList.appendChild(div);
    bindInputs(div);
    refreshNumbers();
    recompute();
  };

  window.removeProcess = function(btn){
    var items = processList.querySelectorAll('.process-item');
    if (items.length <= 1) {
      items[0].querySelector('.proc-price').value = '';
      recompute();
      return;
    }
    btn.closest('.process-item').remove();
    refreshNumbers();
    recompute();
  };

  function refreshNumbers(){
    var items = processList.querySelectorAll('.process-item');
    for (var i = 0; i < items.length; i++) {
      items[i].querySelector('.proc-num').textContent = 'е®ёгғҘз°ӯ' + (i + 1);
    }
  }

  function bindInputs(container){
    var inputs = container.querySelectorAll('input');
    for (var i = 0; i < inputs.length; i++) {
      inputs[i].addEventListener('input', recompute);
    }
  }

  var fixedInputs = [fabricPricePerKg, fabricWidth, fabricWeight, lossRate, managementFee, shippingFee, otherFee, taxRate, profitRate];
  for (var i = 0; i < fixedInputs.length; i++) {
    fixedInputs[i].addEventListener('input', recompute);
  }

  var initialProcesses = document.querySelectorAll('.process-item');
  for (var j = 0; j < initialProcesses.length; j++) { bindInputs(initialProcesses[j]); }

  var allNumbers = document.querySelectorAll('input[type="number"]');
  for (var k = 0; k < allNumbers.length; k++) {
    allNumbers[k].addEventListener('change', function(){
      if (this.value && parseFloat(this.value) < 0) this.value = 0;
      recompute();
    });
  }

  recompute();
})();
</script>

</body>
</html>
